<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Premium Signal Report</title>
    
    <!-- Website Favicon and Home Screen App Icon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/RFZXMyWF/20260612-224955.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/RFZXMyWF/20260612-224955.png">
    <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/RFZXMyWF/20260612-224955.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Signal Report">
    <meta name="application-name" content="Signal Report">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box; /* এটি স্ক্রিনের বাইরে যাওয়া রোধ করবে */
        }
        body { 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            color: white; 
            display: flex; 
            justify-content: center; 
            padding: 20px 10px; /* সাইডের প্যাডিং কমানো হয়েছে */
            min-height: 100vh; 
            overflow-x: hidden; /* ডানে-বামে স্ক্রল বন্ধ করা হয়েছে */
        }
        .container { 
            max-width: 450px; 
            width: 100%; 
        }
        
        /* Input Area Styling */
        .input-section {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 10px; 
            font-size: 14px; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            resize: vertical;
        }
        textarea:focus { outline: 2px solid #ffd700; }
        
        .error-message { color: #ff5555; font-size: 13px; margin-top: 10px; display: none; text-align: center;}

        /* Report Card Styling */
        .report-content {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://i.postimg.cc/tJhNQXVw/1000013379.jpg') center/cover no-repeat;
            padding: 15px 10px; 
            border-radius: 10px; 
            position: relative; 
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            overflow: hidden; 
        }

        /* --- Watermark Logo Styling --- */
        .watermark-logo {
            position: absolute;
            top: 50%; /* একদম মাঝখানে সেট করা হলো */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; /* জায়গা একটু বাড়ানো হলো যেন ক্লিয়ার আসে */
            height: 80%;
            background-image: url('https://i.postimg.cc/RFZXMyWF/20260612-224955.png'); 
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5; /* অপাসিটি ৫০% */
            z-index: 0; 
            pointer-events: none; 
        }

        .title, .subtitle, .report-table { 
            position: relative;
            z-index: 1; 
        }

        .title { 
            font-size: 22px; 
            font-weight: bold; 
            color: #ffd700; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
        }
        .subtitle { 
            font-size: 14px; 
            color: white; 
            margin-bottom: 15px; 
        }
        
        /* Table Styling */
        .report-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13px; 
            margin-bottom: 20px; 
            table-layout: fixed; 
        }
        
        /* কলামগুলোর সাইজ ভাগ করে দেওয়া হয়েছে */
        .report-table th:nth-child(1) { width: 25%; }
        .report-table th:nth-child(2) { width: 28%; }
        .report-table th:nth-child(3) { width: 22%; }
        .report-table th:nth-child(4) { width: 25%; }

        .report-table th { 
            background: #333; 
            padding: 8px 2px; 
            font-weight: bold; 
            font-size: 12px;
            text-transform: uppercase; 
            color: white; 
            border-bottom: 2px solid #ffd700; 
            text-align: center;
        }
        .report-table td { 
            padding: 8px 2px; 
            border-bottom: 1px solid #444; 
            color: white; 
            text-align: center; 
            vertical-align: middle;
        }
        
        /* Editable focus */
        .title[contenteditable="true"]:focus, .subtitle[contenteditable="true"]:focus, td[contenteditable="true"]:focus {
            outline: 2px solid #ffd700; background: rgba(255, 215, 0, 0.2);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }
        button { 
            padding: 12px; 
            font-size: 15px; 
            background: #ffd700; 
            color: #000; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: background 0.3s, transform 0.2s; 
            width: 100%; 
            font-weight: bold;
        }
        button:hover { background: #e6c200; transform: scale(1.02); }
        
        .btn-download { background: #28a745; color: white; }
        .btn-download:hover { background: #218838; }

        .hide-on-export { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <textarea id="report-input" placeholder="Paste your weekly reports here...">
25 May to 29 May 2026 Premium Channel Result
……………………………………………
26 May>>>> XAUUSD Sell +170pips (TP2)
26 May>>>> XAUUSD Sell +250pips (TP3)
27 May>>>> XAUUSD Sell +260pips (TP3)
28 May>>>> XAUUSD Buy +200pips (TP3)
29 May>>>> XAUUSD Buy -100pips (SL)
            </textarea>
            <div class="error-message" id="error-message">
                Invalid report format. Please check the format and try again.
            </div>
            <button onclick="toggleEdit()" id="edit-btn" style="margin-top: 15px;">Toggle Edit Mode</button>
        </div>

        <!-- Generated Reports Output -->
        <div id="reports-container"></div>
    </div>

    <script>
        function parseReports() {
            const input = document.getElementById('report-input').value.trim();
            const container = document.getElementById('reports-container');
            const error = document.getElementById('error-message');
            container.innerHTML = '';
            error.style.display = 'none';

            if (!input) return;

            const lines = input.split('\n').map(l => l.trim()).filter(l => l && !/^[\.…]+$/.test(l));
            const rangeRegex = /^(\d{1,2}\s+[A-Za-z]+)\s+to\s+(\d{1,2}\s+[A-Za-z]+)\s+\d{4}/i;
            const rowRegex = /^(\d{1,2}\s+[A-Za-z]+)>>>>\s*(\w+)\s+(Buy|Sell)\s+([+-]?\d+)\s*pips?\s*(?:\(([^)]+)\))?\s*$/i;

            let reports = [];
            let current = { dateRange: '', rows: [], rawDate: '' };
            let valid = false;

            lines.forEach(line => {
                if (rangeRegex.test(line)) {
                    const m = line.match(rangeRegex);
                    if (current.rows.length > 0) reports.push(current);
                    current = { 
                        dateRange: `Date: ${m[1]} to ${m[2]} 2026`, 
                        rawDate: `${m[1]}_to_${m[2]}_2026`.replace(/\s+/g, '_'),
                        rows: [] 
                    };
                } 
                else if (rowRegex.test(line) && current.dateRange) {
                    const m = line.match(rowRegex);
                    
                    let rawPips = m[4];
                    let isNegative = rawPips.includes('-');
                    let numericPips = rawPips.replace(/[^0-9]/g, ''); 
                    let sign = isNegative ? '-' : '+';
                    
                    // TP/SL কে সুন্দরভাবে নিচে নামানোর জন্য <br> যোগ করা হয়েছে
                    let tp = m[5] ? `<br>(${m[5]})` : '';
                    let result = `${sign}${numericPips}pips${tp}`;

                    // Date কে সুন্দরভাবে ২ লাইনে দেখানোর জন্য <br> যোগ করা হয়েছে (যেমন 09 <br> February)
                    let dateParts = m[1].trim().split(/\s+/);
                    let formattedDate = dateParts.length === 2 ? `${dateParts[0]}<br>${dateParts[1]}` : m[1].trim();

                    current.rows.push({ 
                        date: formattedDate, 
                        symbol: m[2].trim().toUpperCase(), 
                        dir: m[3].trim(), 
                        res: result 
                    });
                    valid = true;
                }
            });

            if (current.rows.length > 0) reports.push(current);

            if (!valid && lines.length > 0) {
                error.style.display = 'block';
            }

            reports.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'report-content';
                div.id = `report-content-${i}`;
                div.innerHTML = `
                    <div class="watermark-logo"></div>
                    <div class="title">WEEKLY PREMIUM SIGNAL</div>
                    <div class="subtitle" contenteditable="false">${r.dateRange}</div>
                    <table class="report-table">
                        <thead><tr><th>DATE</th><th>SYMBOL</th><th>DIRECTION</th><th>RESULT</th></tr></thead>
                        <tbody id="report-table-body-${i}"></tbody>
                    </table>
                    <div class="btn-group hide-on-export">
                        <button class="btn-download" onclick="downloadReport(${i}, '${r.rawDate}')">Download as Image</button>
                    </div>
                `;
                container.appendChild(div);

                const tbody = document.getElementById(`report-table-body-${i}`);

                r.rows.forEach(row => {
                    const tr = document.createElement('tr');
                    
                    const dirColor = row.dir.toLowerCase() === 'buy' ? '#4CAF50' : '#FF5252';
                    const resColor = row.res.startsWith('+') ? '#4CAF50' : '#FF5252';

                    tr.innerHTML = `
                        <td contenteditable="false">${row.date}</td>
                        <td contenteditable="false" style="font-weight: bold;">${row.symbol}</td>
                        <td contenteditable="false" style="color: ${dirColor}; font-weight: bold;">${row.dir}</td>
                        <td contenteditable="false" style="color: ${resColor}; font-weight: bold;">${row.res}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        function toggleEdit() {
            const editables = document.querySelectorAll('[contenteditable]');
            const btn = document.getElementById('edit-btn');
            const isEditable = editables.length > 0 && editables[0].getAttribute('contenteditable') === 'true';
            
            editables.forEach(el => el.setAttribute('contenteditable', isEditable ? 'false' : 'true'));
            btn.innerHTML = isEditable ? 'Toggle Edit Mode' : 'Save Changes';
        }

        function downloadReport(index, dateName) {
            const err = document.getElementById('error-message');
            if (err.style.display === 'block') return alert('Fix report format first!');
            
            const element = document.getElementById(`report-content-${index}`);
            const buttons = element.querySelector('.hide-on-export');
            
            // Hide buttons before capture
            if (buttons) buttons.style.display = 'none';

            html2canvas(element, {
                scale: 3,
                useCORS: true,
                backgroundColor: null,
                logging: false,
                onclone: (clonedDoc) => {
                    const clonedEl = clonedDoc.getElementById(`report-content-${index}`);
                    if (clonedEl) {
                        clonedEl.style.background = "linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.postimg.cc/tJhNQXVw/1000013379.jpg') center/cover no-repeat";
                    }
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Premium_Signal_${dateName || 'Report'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Show buttons again
                if (buttons) buttons.style.display = 'block';
            }).catch(() => {
                if (buttons) buttons.style.display = 'block';
                alert('Download failed. Please try again.');
            });
        }

        // Generate on input change
        document.getElementById('report-input').addEventListener('input', parseReports);
        
        // Initial load
        parseReports();
    </script>
</body>
</html>
